<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interação Teclado</title>
    <link rel="stylesheet" href="css/apresentacao.css">
</head>
<body>

<div id="palco">
    <img id="fundo" class="imagem-camada" src="" alt="Fundo">
    
    <div id="caixa-instrucao">
        <div id="conteudo-texto">Carregando...</div>
        <div class="divisor"></div>
        <div class="rodape-caixa">
            <button id="btn-avancar" onclick="proximoPassoInteracao()">AVANÇAR ➔</button>
            <button id="meu-btn-next" class="btn-concluir" onclick="proximoPasso()" style="display:none">CONCLUIR ✔</button>
        </div>
    </div>
    
    <div id="camada-interativa">
        <div id="hotspot"></div>
    </div>
</div>

<script src="intera-01-02.js"></script>

<script>
    let atual = 0;
    const imgFundo = document.getElementById('fundo');
    const displayTexto = document.getElementById('conteudo-texto');
    const btnAvancar = document.getElementById('btn-avancar');
    const btnConcluir = document.getElementById('meu-btn-next');
    const btnHotspot = document.getElementById('hotspot');

    function renderizar() {
        if (typeof passosInteracao === 'undefined') return;
        const dados = passosInteracao[atual];
        
        imgFundo.src = "imgs/" + dados.img;
        displayTexto.innerHTML = dados.text;

        // Controle do Holofote Azul
        if (dados.w === 0 && dados.h === 0) {
            btnHotspot.style.opacity = "0";
        } else {
            btnHotspot.style.opacity = "1";
            btnHotspot.style.left = dados.x + "%"; 
            btnHotspot.style.top = dados.y + "%";
            btnHotspot.style.width = dados.w + "%"; 
            btnHotspot.style.height = dados.h + "%";
        }

        // Troca de Botões (Azul para Verde)
        if (dados.tipo === "final") {
            btnAvancar.style.display = "none";
            btnConcluir.style.display = "block";
        } else {
            btnAvancar.style.display = "block";
            btnConcluir.style.display = "none";
        }
    }

    function proximoPassoInteracao() {
        if (atual < passosInteracao.length - 1) {
            atual++; 
            renderizar(); 
        }
    }

    // 🎯 [CORRIGIDO]: Agora usa a ponte de comunicação oficial e a matemática segura
    function proximoPasso() {
        console.log("[INTERAÇÃO 01-02] Botão Concluir clicado.");
        
        // 1. Pega o parâmetro 'slide' da URL atual enviado pelo aula.js
        const params = new URLSearchParams(window.location.search);
        const slideOrigem = parseInt(params.get('slide')) || 0;
        
        // 2. Faz a soma matemática exata (Evita concatenação de texto)
        const proximoSlide = slideOrigem + 1;
        
        console.log("[INTERAÇÃO 01-02] Invocando ponte do pai para avançar ao slide: " + proximoSlide);

        // 3. Dispara o gatilho na tela pai sem forçar o reload da página inteira!
        if (window.parent && typeof window.parent.avancarSlidePelaInteracao === 'function') {
            window.parent.avancarSlidePelaInteracao(proximoSlide);
        } else {
            console.error("[ERRO] Função avancarSlidePelaInteracao não encontrada na janela mãe (aula.html).");
        }
    }

    window.onload = renderizar;
</script>
</body>
</html>
