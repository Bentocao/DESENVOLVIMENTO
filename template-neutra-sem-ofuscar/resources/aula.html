<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula</title>
    <script src="neutralino.js"></script>
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div id="player">
    <div id="conteudo-animado">
        <div class="image-area" id="area-visual">
            <img id="main-img" src="" alt="Slide">
            <iframe id="main-iframe" src="" style="display:none; width:100%; height:100%; border:none;"></iframe>
        </div>
        <div class="h-divider" id="divisor"></div>
        <div id="main-text"></div>
    </div>

    <div class="bottom-bar">
        <div class="left-controls">
            <audio id="player-audio" autoplay style="display: none;"></audio>
            <button id="btnExit" onclick="fecharAula()" title="Voltar ao Menu Geral">
				<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
			</button>
			<button id="btnSair" onclick="encerrarAplicativo()" title="Sair do Curso Definitivamente">
				<svg viewBox="0 0 24 24" fill="currentColor" style="width:24px; height:24px;">
					<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
				</svg>
			</button>
            <button id="btnHome" onclick="irParaInicio()" title="Voltar ao Início">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <button id="btnMute" onclick="alternarAudio()" title="Ativar/Desativar Áudio">
                <svg id="icon-audio-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg id="icon-audio-off" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>

            <div class="info-text">
                <span id="course-name"></span>
                <span class="text-separator">|</span>
                <span id="progress-text"></span>
            </div>
        </div>
        
        <div class="nav-group">
			<button id="btnPrev" onclick="voltar()" title="Voltar">
				<svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
			</button>
			<button id="btnNext" onclick="proximo()" title="Avançar">
				<span id="next-icon">
					<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
				</span>
				<span id="next-text" style="display:none;" title="Concluir">
					<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
				</span>
			</button>
		</div>
    </div>
</div>
<script src="mg.js"></script>
<script src="aula.js"></script>
</body>
</html>
