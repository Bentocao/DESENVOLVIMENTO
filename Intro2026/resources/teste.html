<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento Windows 10 - Teste</title>
    <link rel="stylesheet" href="css/teste.css"> 
</head>
<body>

<div id="player">
    <div id="conteudo-animado" style="height: 100%; display: flex; flex-direction: column;">
        <div class="image-area" id="area-visual">
            <h2 id="texto-pergunta">Carregando pergunta...</h2>
            <img id="img-pergunta" src="" style="max-height: 200px; margin-bottom: 20px; display: none; border-radius: 5px;">
            <div id="container-opcoes"></div>
        </div>
        <div class="h-divider" id="divisor"></div>
        <div id="main-text">
            <div id="feedback"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="left-controls">
            <audio id="main-audio" style="display: none;"></audio>
            <button id="btnHome" onclick="sairDoTeste()" title="Sair do Teste">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <button id="btnMute" onclick="alternarAudio()" title="Ativar/Desativar Áudio">
                <svg id="icon-audio-on" viewBox="0 0 24 24"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            </button>
            <div class="info-text">
                <span id="course-name">Avaliação</span>
                <span class="text-separator">|</span>
                <span id="progress-text">Carregando...</span>
            </div>
        </div>
        <div class="nav-group">
            <button id="btn-avancar" onclick="proximaAcao()" title="Avançar" style="display: none;">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idTeste = urlParams.get('id'); // Pega "A1", "A2", "TF", etc.
    
    // AQUI ESTÁ O AJUSTE: Só tenta carregar o arquivo físico se NÃO for o Teste Final
    if (idTeste && idTeste !== 'TF') {
        const s = document.createElement('script');
        s.src = `testes/teste${idTeste}.js`; // Carrega testes/testeA1.js
        document.body.appendChild(s);
    }
</script>

<script src="teste.js"></script>
</body>
</html>
