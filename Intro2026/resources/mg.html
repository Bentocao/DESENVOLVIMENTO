<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Geral - Windows 11</title>
    <link rel="stylesheet" href="css/mg.css">
</head>
<body>

<div id="player">
    <div id="conteudo-animado" style="height: 100%; display: flex; flex-direction: row; padding-bottom: 70px;">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Conteúdo do Curso</h2>
            </div>
            <div id="menu-aulas-container" class="menu-scroll"></div>
        </div>

        <div class="main-content" style="display: flex; flex-direction: column; justify-content: center; padding: 60px;">
            <div class="header-boas-vindas" style="margin-bottom: 40px;">
                <h1 style="font-size: 2.6em; color: #222; margin: 0 0 10px 0; font-weight: 300;">Olá, <span id="nome-aluno">Fernando</span>! 👋</h1>
                <p style="font-size: 1.2em; color: #666; margin: 0;">Que bom ter você de volta para continuar seus estudos.</p>
            </div>
            
            <div id="resume-card" class="resume-card" style="background: #f8f9fa; padding: 40px; border-radius: 12px; border-left: 6px solid #0078d7; box-shadow: 0 8px 25px rgba(0,0,0,0.05); max-width: 650px; transition: all 0.3s ease;">
                <p id="label-etapa" style="color: #888; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; font-weight: 600;">Sua próxima etapa</p>
                
                <h2 id="aula-atual-titulo" style="margin: 0 0 10px 0; color: #222; font-size: 1.8em;">Carregando...</h2>
                <h3 id="topico-atual-titulo" style="margin: 0 0 30px 0; color: #0078d7; font-weight: normal; font-size: 1.3em;">Aguarde um momento</h3>
            </div>
        </div>
    </div> 

    <div class="bottom-bar">
        <div class="left-controls">
            
            <button id="btnSair" title="Sair do Curso">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:24px; height:24px;">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>

            <button id="btnMenuContinuar" title="Continuar Estudando">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.1-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.35-.75-2-1zm-1 12.4c-1.2-.35-2.6-.5-4-.5-1.95 0-4.05.4-5.5 1.5V7.5c1.45-1.1 3.55-1.5 5.5-1.5 1.4 0 2.8.15 4 .5v10.9z"/>
                </svg>
            </button>

            <button id="btnMenuPraticar" title="Praticar Exercícios" class="btn-bloqueado" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83zM2 3h10v2H2V3zm0 4h6v2H2V7zm0 4h6v2H2v-2z"/>
                </svg>
            </button>

            <button id="btnMenuTestes" title="Realizar Testes / Avaliações" class="btn-bloqueado" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
            </button>

            <div class="info-text"><span id="course-name">WINDOWS 11</span></div>
        </div>

    </div>
</div> 
<script src="neutralino.js"></script>
<script src="conteudo/conteudomg.js"></script>
<script src="mg.js"></script>
</body>
</html>
